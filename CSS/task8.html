<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-8</title>
    <style type="text/css">
        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 19px;
        }
        #dv{
            width: 700px;
            height: auto;
            border:1px solid #000;
        }
        #textInput{
            width: 450px;
            height: auto;
            padding: 7px;
            font-size: 19px;
            border: 1px solid #000;
            border-radius: 8px;
        }
        #txtarea{
            min-width: 450px;
            min-height: 100px;
            max-width: 450px;
            max-height: 100px;
            padding: 7px;
            font-size: 19px;
            border: 1px solid #000;
            border-radius: 8px;
        }
        #fileInput{
            width: 450px;
            padding: 7px;
            font-size: 19px;
            border: 1px solid #000;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="dv">
        <h1>User Registration</h1>
        <form name="reg-frm">
            <table cellpadding="7">
                <tbody>
                    <tr>
                        <td>First name</td>
                        <td><input id="textInput" type="text" name="fname" required placeholder="Enter your  frist name"></td>
                    </tr>
                    <tr>
                        <td>Last Name</td>
                        <td><input id="textInput" type="text" name="lname" required></td>
                    </tr>
                    <tr>
                        <td>Date of Birth</td>
                        <td><input id="textInput" type="date" name="dob" required></td>
                    </tr>
                    <tr>
                        <td>Email-Id</td>
                        <td><input id="textInput" type="email" name="email_id" required></td>
                    </tr>
                    <tr>
                        <td>Password</td>
                        <td><input id="textInput" type="password" name="pwd" required></td>
                    </tr>
                    <tr>
                        <td>Gender</td>
                        <td>
                            <input type="radio" name="gender" value="Male" checked>Male
                            <input type="radio" name="gender" value="Female">Female
                        </td>
                    </tr>
                    <tr>
                        <td>Languages</td>
                        <td>
                            <input type="checkbox" name="lang" value="C" checked>C
                            <input type="checkbox" name="lang" value="PHP">PHP
                            <input type="checkbox" name="lang" value="JavaScript">JavaScript
                        </td>
                    </tr>
                    <tr>
                        <td>Address</td>
                        <td>
                            <textarea id="txtarea" name="address" rows="5" cols="21" required></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td>City</td>
                        <td>
                            <select id="textInput" name="city" required>
                                <option value="" selected>-Select City</option>
                                <option value="Kolkata">Kolkata</option>
                                <option value="Delhi">Delhi</option>
                                <option value="Mumbai">Mumbai</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Select file</td>
                        <td><input  id="fileInput" type="file" name="img"></td>
                    </tr>
                    <tr>
                        <td align="center" colspan="2">
                            <input type="reset" name="rs" value="Reset">
                            <input type="submit" name="ok" value="Register">
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </div>
</body>
</html>
