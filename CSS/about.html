<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <style type="text/css">
        body{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        #wrapper{
            margin: 0 auto;
            width: 1100px;
            height: 45px;
            border: 1px solid #000;
        }
        .menu{
            width: 100%;
            height: 45px;
        }
        .menu ul{
            margin: 0;
            padding: 0;
            display: flex;
        }
        .menu ul li{
            margin: 0 15px 0 0;
            padding: 0;
            list-style: none;
            width: 125px;
            height: 45px;
            background-color: brown;
        }
        .menu ul li a{
            height: 34px;
            padding-top: 11px;
            display: block;
            text-align: center;
            text-decoration: none;
            font-size: 20px;
            color: #fff;
        }
        .menu ul li a:hover, .active{
            background-color: rgb(255, 65, 65);
        }
        /* .active{
            background-color: rgb(255, 65, 65);
        } */
    </style>
</head>
<body>
    <main id="wrapper">
        <nav class="menu">
            <ul>
                <li>
                    <a href="navbar.html">Home</a>
                </li>
                <li>
                    <a href="about.html" class="active">About</a>
                </li>
                <li>
                    <a href="#">Contact</a>
                </li>
            </ul>
        </nav>
    </main>
</body>
</html>
