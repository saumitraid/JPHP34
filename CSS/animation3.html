<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style type="text/css">
        #dv1{
            width: 150px;
            height: 150px;
            position: relative;
            background-color: red;
            animation-name: myAnimation;
            animation-duration: 6s;
            /* animation-delay: 4s;  */
            animation-iteration-count: infinite; /*No. of times */
        }
        @keyframes myAnimation {
            0% {background-color: red; left: 0; top: 0;}
            25%{background-color: yellow; left: 300px; top: 0;}
            50%{background-color: blue; left: 300px; top: 200px;}
            75%{background-color: green; left: 0; top: 200px;}
            100%{background-color: red; left: 0; top: 0;}
        }
    </style>
</head>
<body>
    <h1>CSS Animation</h1>
    <div id="dv1"></div>
</body>
</html>
